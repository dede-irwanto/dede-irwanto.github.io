<div class="row d-flex justify-content-between border-top border-bottom">
    <div class="col-6 text-center py-5 border-end">
        {% if page.previous.url %}
        <a class="prev text-dark" href="{{page.previous.url}}">&laquo; {{page.previous.title}}</a>
        {% endif %}
    </div>
    <div class="col-6 text-center py-5">
        {% if page.next.url %}
        <a class="next text-dark" href="{{page.next.url}}">{{page.next.title}} &raquo;</a>
        {% endif %}
    </div>
</div>
