<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title"
    content="{%if page.url!='/' %}{{page.title}} — {% endif %}Dede-Irwanto.Github.io — Tulisan Seorang Pemalas.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>{%if page.url!="/" %}{{page.title}} — {% endif %}Dede-Irwanto.Github.io — Tulisan Seorang
    Pemalas.</title>
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2833626224056161"
    crossorigin="anonymous"></script>
  <meta name="keywords" content="{{page.keywords}}">
  <meta name="robots" content="index, follow">
  {%seo%}

  <link href="https://dede-irwanto.github.io/" rel="canonical" />
  <!-- Bootstrap CSS -->
  <link href="/assets/bootstrap/bootstrap.min.css" rel="stylesheet" />
  <!-- AOS CSS  -->
  <link href="/assets/aos/aos.css" rel="stylesheet">
  <!-- Custom CSS  -->
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <!-- Bootstrap Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
  <!-- Fontawesome Icon -->
  <link rel="stylesheet" href="/assets/fontawesome/css/all.css">
  <!-- Algolia -->
  <link rel="stylesheet" href="/assets/algolia/autocomplete-theme-classic.css" />
</head>

<body>
  <!-- Navbar  -->
  {% include navigation.html %}
  <div class="container">
    <div class="row">
      <div class="col-lg-10 offset-lg-1 col-12">
        <!-- Content -->
        <section class="main-section" data-aos="zoom-out" data-aos-duration="1500">
          {{ content }}
        </section>

        <!-- totop -->
        <h2>
          <i id="back-to-top" class="bi bi-caret-up-square-fill"></i>
        </h2>

        <!-- Footer -->
        <footer class="pt-5 pb-3 small text-dark">
          <div class="container">
            <div class="row justify-content-lg-between align-items-center border-top border-4 border-danger pt-3">
              <div class="col-lg-6 justify-content-lg-start justify-content-start ps-0">
                Copyright &copy; <a class="text-dark text-decoration-none fw-bold"
                  href="https://dede-irwanto.github.io">Dede
                  Irwanto</a>. All
                rights reserved.
              </div>
              <div class="col-lg-6 justify-content-lg-end pe-0">
                {% include footernav.html %}
              </div>
            </div>
          </div>
        </footer>
      </div>
    </div>
  </div>
  <!-- Bootstrap JavaScript Bundle with Popper -->
  <script src="/assets/bootstrap/bootstrap.bundle.min.js"></script>
  <!-- AOS JavaScript -->
  <script src="/assets/aos/aos.js"></script>
  <script>
    AOS.init();
  </script>
  <!-- JQuery  -->
  <script src="/assets/jquery/jquery-3.6.1.min.js"></script>
  <!-- Custom JavaScript  -->
  <script src="/assets/js/scripts.js"></script>
  <!-- Algolia -->
  <script src="/assets/algolia/algoliasearch-lite.umd.js"></script>
  <script src="/assets/algolia/autocomplete-js.js"></script>
  <script src="/assets/js/search.js" type="module"></script>

</body>

</html>
